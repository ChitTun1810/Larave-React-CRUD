services:

  # ─────────────────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: crud_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_crud
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────
  # Laravel Backend – FrankenPHP (HTTP on 8080, internal only)
  # ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: crud_backend
    restart: unless-stopped
    environment:
      SERVER_NAME: ":8080"
    volumes:
      - backend_storage:/app/storage
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"

  # ─────────────────────────────────────────────────────────
  # React Frontend – served by Nginx on port 3000 (internal)
  # ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: crud_frontend
    restart: unless-stopped
    networks:
      - app_net
    expose:
      - "3000"

  # ─────────────────────────────────────────────────────────
  # Nginx Reverse Proxy – ONLY port exposed to host
  #   http://localhost:90/      → frontend
  #   http://localhost:90/api   → backend (Laravel)
  # ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: crud_nginx
    restart: unless-stopped
    ports:
      - "90:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_net
    depends_on:
      - frontend
      - backend

  # ─────────────────────────────────────────────────────────
  # One-off: Run migrations then exit
  # Run with:  docker compose run --rm migrate
  # ─────────────────────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
    container_name: crud_migrate
    command: >
      sh -c "php artisan migrate --force &&
             php artisan config:cache &&
             php artisan route:cache &&
             php artisan view:cache"
    networks:
      - app_net
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  db_data:
  backend_storage:

networks:
  app_net:
    driver: bridge
